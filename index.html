<div id="espn-scoreboard" style="font-family: Arial, sans-serif;"></div>

<script>
// =======  USER SETTINGS  =======
const leagueId = 669421075;   // <-- keep
const season   = 2025;        // <-- update next year
const autoWeek = true;        // true = compute week from today
const manualWeek = 1;         // used if autoWeek = false
const refreshSeconds = 120;   // auto-refresh interval
// ===============================

const kickoff2025 = new Date('2025-09-04T00:00:00Z'); // first NFL game UTC

function currentWeek() {
  if (!autoWeek) return manualWeek;
  const diffDays = Math.floor((Date.now() - kickoff2025) / 86400000);
  return Math.max(1, Math.min(18, Math.ceil((diffDays + 1) / 7)));
}
